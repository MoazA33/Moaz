<title>Chat App</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set, get, remove, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBXt87jxadXgWvAS_fRDOMECVt-VBgZfGg",
  authDomain: "moaz-6e663.firebaseapp.com",
  databaseURL: "https://moaz-6e663-default-rtdb.firebaseio.com",
  projectId: "moaz-6e663",
  storageBucket: "moaz-6e663.firebasestorage.app",
  messagingSenderId: "1040611404093",
  appId: "1:1040611404093:web:467e8f4bc855154e15bd54"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const CURRENT_VERSION = 4; // ← غيّر الرقم ده لما تعمل تحديث جديد

const colors = ['#5865f2','#eb459e','#23a559','#f0b132','#ed4245','#00b0f4','#ff7043','#ab47bc','#26c6da','#66bb6a'];
let myName = '', myColor = '', currentRoom = null, currentRoomType = null;

// ── نظام التحديث التلقائي ──
function checkForUpdates() {
  onValue(ref(db, 'app/version'), snap => {
    const serverVersion = snap.val();
    if(serverVersion && serverVersion > CURRENT_VERSION) {
      showUpdateBanner(serverVersion);
    }
  });
}

function showUpdateBanner(v) {
  const existing = document.getElementById('updateBanner');
  if(existing) return;
  const banner = document.createElement('div');
  banner.id = 'updateBanner';
  banner.innerHTML = `
    <span>🚀 في تحديث جديد للموقع! (v${v})</span>
    <button onclick="location.reload(true)">تحديث دلوقتي</button>
    <button onclick="this.parentElement.remove()" style="background:transparent;border:1px solid rgba(255,255,255,0.3)">لاحقاً</button>
  `;
  banner.style.cssText = `
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:#23a559;color:#fff;padding:12px 20px;border-radius:12px;
    display:flex;align-items:center;gap:12px;z-index:9999;
    box-shadow:0 8px 32px rgba(0,0,0,0.4);font-family:'Cairo',sans-serif;font-weight:700;font-size:14px;
    animation:slideUp .3s ease;white-space:nowrap;
  `;
  const style = document.createElement('style');
  style.textContent = `
    @keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    #updateBanner button{background:#fff;color:#23a559;border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;}
  `;
  document.head.appendChild(style);
  document.body.appendChild(banner);
}

// اكتب الـ version الحالية على Firebase (بس أول مرة أو لو اتحدثت)
function publishVersion() {
  get(ref(db,'app/version')).then(snap => {
    const v = snap.val() || 0;
    if(CURRENT_VERSION > v) set(ref(db,'app/version'), CURRENT_VERSION);
  });
}

checkForUpdates();
publishVersion();

function getChatId(a, b) { return [a,b].sort().join('__'); }
function esc(t) { const d=document.createElement('div'); d.appendChild(document.createTextNode(t)); return d.innerHTML; }
function ts(time) { return time ? new Date(time).toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'}) : ''; }

// ── LOGIN ──
window.login = function() {
  const n = document.getElementById('nameInput').value.trim();
  const p = document.getElementById('passInput').value.trim();
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  if(!n || !p) {
    errEl.textContent = '⚠️ اكتب الاسم والباسورد!';
    errEl.style.display = 'block'; return;
  }

  // شوف لو الاسم موجود في Firebase
  get(ref(db, `users/${n}`)).then(snap => {
    if(snap.exists()) {
      // حساب موجود — تحقق من الباسورد
      const userData = snap.val();
      if(userData.password !== btoa(p)) {
        errEl.textContent = '❌ الباسورد غلط!';
        errEl.style.display = 'block'; return;
      }
      // باسورد صح — ادخل
      myColor = userData.color;
      enterApp(n, myColor, p);
    } else {
      // حساب جديد — سجّل
      myColor = colors[Math.floor(Math.random()*colors.length)];
      enterApp(n, myColor, p);
    }
  });
}

function enterApp(name, color, pass) {
  myName = name; myColor = color;
  const uRef = ref(db, `users/${myName}`);
  set(uRef, { name:myName, color:myColor, online:true, password: btoa(pass) });
  onDisconnect(uRef).update({ online:false });
  // احفظ في المتصفح
  localStorage.setItem('chatUser', JSON.stringify({name:myName, pass: btoa(pass)}));
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'flex';
  document.getElementById('myNameDisplay').textContent = myName;
  document.getElementById('myAvatar').textContent = myName[0].toUpperCase();
  document.getElementById('myAvatar').style.background = myColor;
  document.getElementById('shareLink').textContent = window.location.href;
  listenUsers(); listenGroups(); listenRecentChats(); listenIncomingCall();
}

// ── كل المستخدمين (للبحث) ──
let allUsers = {};
function listenUsers() {
  onValue(ref(db,'users'), snap => {
    allUsers = snap.val() || {};
    renderSearch(document.getElementById('searchInput').value.trim());
    renderRecentChats();
  });
}

// ── بحث ──
window.onSearchInput = function() {
  const q = document.getElementById('searchInput').value.trim();
  renderSearch(q);
}

function renderSearch(q) {
  const results = document.getElementById('searchResults');
  if(!q) { results.style.display='none'; return; }
  const matches = Object.values(allUsers).filter(u => u.name !== myName && u.name.toLowerCase().includes(q.toLowerCase()));
  results.style.display = 'block';
  results.innerHTML = '';
  if(!matches.length) { results.innerHTML='<div class="empty-list" style="padding:12px">مش لاقيه 🔍</div>'; return; }
  matches.forEach(u => {
    const d = document.createElement('div');
    d.className = 'list-item';
    d.onclick = () => { document.getElementById('searchInput').value=''; results.style.display='none'; openDM(u); };
    d.innerHTML = `
      <div class="item-avatar" style="background:${u.color}">${u.name[0].toUpperCase()}<span class="dot ${u.online?'on':'off'}"></span></div>
      <div class="item-info"><div class="item-name">${esc(u.name)}</div><div class="item-sub">${u.online?'🟢 أونلاين':'⚫ أوفلاين'}</div></div>`;
    results.appendChild(d);
  });
}

// ── المحادثات الأخيرة ──
let recentChats = {}; // { chatId: { name, color, lastMsg, lastTime, isGroup } }

function listenRecentChats() {
  // راقب كل المحادثات اللي أنا فيها
  onValue(ref(db,'chats'), snap => {
    const chats = snap.val() || {};
    recentChats = {};
    Object.entries(chats).forEach(([id, chat]) => {
      // محادثة خاصة — لو اسمي موجود في الـ id
      if(id.includes(myName)) {
        const msgs = chat.messages ? Object.values(chat.messages) : [];
        if(!msgs.length) return;
        msgs.sort((a,b)=>b.time-a.time);
        const last = msgs[0];
        const otherName = id.replace(myName,'').replace('__','');
        const u = allUsers[otherName] || {};
        recentChats[id] = { id, name: otherName, color: u.color||'#5865f2', lastMsg: last.text, lastTime: last.time, isGroup: false, online: u.online };
      }
    });
    renderRecentChats();
  });

  // راقب الجروبات
  onValue(ref(db,'groups'), snap => {
    const groups = snap.val() || {};
    // مسح الجروبات القديمة من recentChats
    Object.keys(recentChats).forEach(id => { if(recentChats[id].isGroup) delete recentChats[id]; });
    Object.entries(groups).forEach(([id, g]) => {
      // جيب آخر رسالة في الجروب
      get(ref(db,`chats/${id}/messages`)).then(snap2 => {
        const msgs = snap2.val() ? Object.values(snap2.val()) : [];
        msgs.sort((a,b)=>b.time-a.time);
        const last = msgs[0];
        recentChats[id] = { id, name: g.name, color:'#5865f2', lastMsg: last ? last.text : 'لا توجد رسايل', lastTime: last ? last.time : g.createdAt, isGroup: true };
        renderRecentChats();
      });
    });
    renderRecentChats();
  });
}

function renderRecentChats() {
  const list = document.getElementById('recentList');
  const sorted = Object.values(recentChats).sort((a,b)=>(b.lastTime||0)-(a.lastTime||0));
  if(!sorted.length) {
    list.innerHTML = '<div class="empty-list">ابحث عن صاحبك فوق وابدأ المحادثة! 👆</div>';
    return;
  }
  list.innerHTML = '';
  sorted.forEach(c => {
    const d = document.createElement('div');
    d.className = 'list-item recent-item' + (currentRoom === c.id ? ' active' : '');
    d.onclick = () => {
      if(c.isGroup) openGroup(c.id, c.name);
      else openDM({ name:c.name, color:c.color, online:c.online });
    };
    const t = c.lastTime ? new Date(c.lastTime).toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'}) : '';
    d.innerHTML = `
      <div class="item-avatar ${c.isGroup?'grp-av':''}" style="${c.isGroup?'':'background:'+c.color}">${c.isGroup?'#':c.name[0].toUpperCase()}${!c.isGroup?`<span class="dot ${c.online?'on':'off'}"></span>`:''}</div>
      <div class="item-info">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="item-name">${esc(c.name)}</div>
          <div style="font-size:11px;color:var(--muted)">${t}</div>
        </div>
        <div class="item-sub" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px">${esc(c.lastMsg||'')}</div>
      </div>`;
    list.appendChild(d);
  });
}

// ── GROUPS ──
function listenGroups() {
  onValue(ref(db,'groups'), snap => {
    const data = snap.val() || {};
    const list = document.getElementById('groupsList');
    list.innerHTML = '';
    if(!Object.keys(data).length) { list.innerHTML = '<div class="empty-list" style="font-size:12px">اضغط + عشان تعمل جروب</div>'; return; }
    Object.entries(data).forEach(([id, g]) => {
      const d = document.createElement('div');
      d.className = 'list-item' + (currentRoom === id ? ' active' : '');
      d.onclick = () => openGroup(id, g.name);
      d.innerHTML = `
        <div class="item-avatar grp-av">#</div>
        <div class="item-info"><div class="item-name">${esc(g.name)}</div><div class="item-sub">جروب</div></div>
        <div class="del-btn" onclick="event.stopPropagation();deleteGroup('${id}')">🗑️</div>`;
      list.appendChild(d);
    });
  });
}

window.showCreateGroup = function() {
  document.getElementById('createGroupModal').style.display = 'flex';
  setTimeout(()=>document.getElementById('groupNameInput').focus(),100);
}
window.closeModal = function() {
  document.getElementById('createGroupModal').style.display = 'none';
  document.getElementById('groupNameInput').value = '';
}
window.createGroup = function() {
  const name = document.getElementById('groupNameInput').value.trim();
  if(!name) return;
  push(ref(db,'groups'), { name, createdBy: myName, createdAt: Date.now() });
  closeModal();
}
window.deleteGroup = function(id) {
  if(confirm('تمسح الجروب ده؟')) {
    remove(ref(db,`groups/${id}`));
    remove(ref(db,`chats/${id}`));
    if(currentRoom === id) { currentRoom=null; showPlaceholder(); }
  }
}

window.openDM = function(u) {
  const id = getChatId(myName, u.name);
  currentRoom = id; currentRoomType = 'dm';
  openChat(id, u.name, u.color, false);
}
window.openGroup = function(id, name) {
  currentRoom = id; currentRoomType = 'group';
  openChat(id, name, '#5865f2', true);
}

window.goBack = function() {
  // على الموبايل — اظهر الـ sidebar وأخفي الشات
  document.querySelector('.sidebar').classList.remove('hidden');
  showPlaceholder();
  currentRoom = null;
  document.querySelectorAll('.list-item').forEach(el=>el.classList.remove('active'));
}

function openChat(id, name, color, isGroup) {
  // على الموبايل — اخفي الـ sidebar
  if(window.innerWidth <= 700) document.querySelector('.sidebar').classList.add('hidden');
  document.getElementById('chatPlaceholder').style.display = 'none';
  document.getElementById('chatArea').style.display = 'flex';
  document.getElementById('chatWithName').textContent = name;
  const av = document.getElementById('chatWithAvatar');
  av.textContent = isGroup ? '#' : name[0].toUpperCase();
  av.style.background = isGroup ? '#404249' : color;
  if(isGroup) av.classList.add('grp-av'); else av.classList.remove('grp-av');
  document.getElementById('msgInput').placeholder = `رسالة لـ ${name}...`;
  document.getElementById('callBtn').style.display = 'flex';
  document.getElementById('callBtn').textContent = '📞 مكالمة';
  document.getElementById('callBtn').style.background = '#23a559';
  endCall();
  listenMessages(id, isGroup);
  listenTyping(id);
}

function showPlaceholder() {
  document.getElementById('chatPlaceholder').style.display = 'flex';
  document.getElementById('chatArea').style.display = 'none';
}

function listenMessages(id, isGroup) {
  const container = document.getElementById('messagesContainer');
  container.innerHTML = '';
  onValue(ref(db,`chats/${id}/messages`), snap => {
    const data = snap.val() || {};
    const msgs = Object.values(data).sort((a,b)=>a.time-b.time);
    container.innerHTML = '';
    msgs.forEach(msg => {
      const isMe = msg.sender === myName;
      const d = document.createElement('div');
      d.className = `msg ${isMe?'msg-me':'msg-them'}`;
      d.innerHTML = `
        <div class="msg-bubble" style="${!isMe?`border-right:3px solid ${msg.color||'#5865f2'}`:''}">
          ${(!isMe&&isGroup)?`<div class="msg-sender" style="color:${msg.color||'#5865f2'}">${esc(msg.sender)}</div>`:''}
          <div class="msg-text">${esc(msg.text)}</div>
          <div class="msg-time">${ts(msg.time)}</div>
        </div>`;
      container.appendChild(d);
    });
    container.scrollTop = container.scrollHeight;
  });
}

window.sendMessage = function() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if(!text || !currentRoom) return;
  push(ref(db,`chats/${currentRoom}/messages`), { sender:myName, text, color:myColor, time:Date.now() });
  input.value = '';
  input.style.height = 'auto';
  input.focus();
}
window.handleKey = function(e) {
  if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  else showTyp();
}

// ══ VOICE CALL (WebRTC Mesh) ══
let localStream = null, peers = {}, inCall = false;
const ICE = { iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}] };

window.startCall = async function() {
  if(inCall) { endCall(); return; }
  if(!currentRoom) return;
  try { localStream = await navigator.mediaDevices.getUserMedia({ audio:true }); }
  catch(e) { alert('❌ مش قادر يوصل للميكروفون! ادي إذن للمتصفح.'); return; }
  inCall = true;
  document.getElementById('callBtn').textContent = '📵 إنهاء';
  document.getElementById('callBtn').style.background = '#ed4245';
  document.getElementById('callStatus').textContent = '🎙️ في انتظار...';
  document.getElementById('callStatus').style.display = 'block';

  const meRef = ref(db, `calls/${currentRoom}/members/${myName}`);
  set(meRef, { joined:Date.now(), name:myName, color:myColor });
  onDisconnect(meRef).remove();

  onValue(ref(db,`calls/${currentRoom}/members`), async snap => {
    const members = snap.val() || {};
    for(const [name] of Object.entries(members)) {
      if(name === myName || peers[name]) continue;
      await connectToPeer(name);
    }
    const others = Object.keys(members).filter(n=>n!==myName);
    document.getElementById('callStatus').textContent = others.length ? `🎙️ مكالمة مع: ${others.join('، ')}` : '🎙️ في انتظار أحد...';
  });

  onValue(ref(db,`calls/${currentRoom}/signals/${myName}`), async snap => {
    const signals = snap.val() || {};
    for(const [from, sigs] of Object.entries(signals)) {
      for(const sig of Object.values(sigs)) await handleSignal(from, sig);
    }
  });
}

async function connectToPeer(peerName) {
  if(peers[peerName]) return;
  const pc = new RTCPeerConnection(ICE);
  peers[peerName] = pc;
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.ontrack = e => { let a=document.getElementById(`aud_${peerName}`); if(!a){a=document.createElement('audio');a.id=`aud_${peerName}`;a.autoplay=true;document.body.appendChild(a);} a.srcObject=e.streams[0]; };
  pc.onicecandidate = e => { if(e.candidate) push(ref(db,`calls/${currentRoom}/signals/${peerName}/${myName}`),{ice:e.candidate.toJSON()}); };
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  push(ref(db,`calls/${currentRoom}/signals/${peerName}/${myName}`),{offer:{type:offer.type,sdp:offer.sdp}});
}

async function handleSignal(from, sig) {
  if(!peers[from]) {
    const pc = new RTCPeerConnection(ICE);
    peers[from] = pc;
    if(localStream) localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
    pc.ontrack = e => { let a=document.getElementById(`aud_${from}`); if(!a){a=document.createElement('audio');a.id=`aud_${from}`;a.autoplay=true;document.body.appendChild(a);} a.srcObject=e.streams[0]; };
    pc.onicecandidate = e => { if(e.candidate) push(ref(db,`calls/${currentRoom}/signals/${from}/${myName}`),{ice:e.candidate.toJSON()}); };
  }
  const pc = peers[from];
  if(sig.offer) {
    await pc.setRemoteDescription(new RTCSessionDescription(sig.offer));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    push(ref(db,`calls/${currentRoom}/signals/${from}/${myName}`),{answer:{type:answer.type,sdp:answer.sdp}});
  }
  if(sig.answer && pc.signalingState !== 'stable') await pc.setRemoteDescription(new RTCSessionDescription(sig.answer));
  if(sig.ice) { try{ await pc.addIceCandidate(new RTCIceCandidate(sig.ice)); }catch(e){} }
}

window.endCall = function() {
  Object.values(peers).forEach(pc=>pc.close()); peers={};
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  document.querySelectorAll('[id^="aud_"]').forEach(a=>a.remove());
  if(currentRoom) remove(ref(db,`calls/${currentRoom}/members/${myName}`));
  inCall=false;
  document.getElementById('callBtn').textContent='📞 مكالمة';
  document.getElementById('callBtn').style.background='#23a559';
  document.getElementById('callStatus').style.display='none';
}

// ── INCOMING CALL NOTIF ──
function listenIncomingCall() {
  onValue(ref(db,'calls'), snap => {
    const calls = snap.val() || {};
    for(const [roomId, callData] of Object.entries(calls)) {
      if(inCall) continue;
      const members = callData.members || {};
      const names = Object.keys(members).filter(n=>n!==myName);
      if(names.length && !members[myName]) {
        document.getElementById('incomingFrom').textContent = names.join('، ');
        document.getElementById('incomingCall').style.display = 'flex';
        window._pendingCallRoom = roomId;
        return;
      }
    }
  });
}

window.acceptCall = async function() {
  document.getElementById('incomingCall').style.display = 'none';
  if(window._pendingCallRoom) {
    const snap = await get(ref(db,`groups/${window._pendingCallRoom}`));
    if(snap.exists()) { currentRoom=window._pendingCallRoom; currentRoomType='group'; openChat(currentRoom, snap.val().name, '#5865f2', true); }
    await startCall();
  }
}
window.rejectCall = function() { document.getElementById('incomingCall').style.display='none'; }


// TYPING
let typT=null;
function showTyp(){if(!currentRoom)return;set(ref(db,'typing/'+currentRoom+'/'+myName),true);clearTimeout(typT);typT=setTimeout(()=>set(ref(db,'typing/'+currentRoom+'/'+myName),null),2000);}
function listenTyping(id){
  onValue(ref(db,'typing/'+id),s=>{
    const data=s.val()||{},typers=Object.keys(data).filter(n=>n!==myName),bar=document.getElementById('typBar');
    if(typers.length){bar.style.display='flex';bar.innerHTML='<div class="tdots"><span></span><span></span><span></span></div><span>'+(typers.length===1?typers[0]+' بيكتب...':typers.join('، ')+' بيكتبوا...')+'</span>';}
    else bar.style.display='none';
  });
}
// REPLY
let replyTo=null;
window.setReply=function(s,t){replyTo={sender:s,text:t};document.getElementById('replyBar').style.display='flex';document.getElementById('replyTxt').textContent=s+': '+t.substring(0,50);document.getElementById('msgInput').focus();}
window.clearReply=function(){replyTo=null;document.getElementById('replyBar').style.display='none';}
// TOAST
function toast(msg,type){const t=document.createElement('div');t.className='toast';t.style.background=type==='red'?'#f23f43':'#23a559';t.textContent=msg;document.getElementById('toasts').appendChild(t);setTimeout(()=>t.classList.add('show'),10);setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),400);},3000);}
window.toast=toast;
window.copyLink = function() {
  navigator.clipboard.writeText(window.location.href).then(()=>{
    const btn=document.querySelector('.copy-btn'); btn.textContent='✅ تم النسخ!';
    setTimeout(()=>btn.textContent='📋 نسخ الرابط',2000);
  });
}
window.onload = () => {
  document.getElementById('shareLink').textContent = window.location.href;
  // لو في حساب محفوظ، ادخل تلقائي
  const saved = localStorage.getItem('chatUser');
  if(saved) {
    try {
      const data = JSON.parse(saved);
      if(data.name && data.pass) {
        document.getElementById('nameInput').value = data.name;
        document.getElementById('passInput').value = atob(data.pass);
        login();
      }
    } catch(e){}
  }
}
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg1:#313338;--bg2:#2b2d31;--bg3:#1e1f22;--bg4:#404249;--bg5:#383a40;
  --accent:#5865f2;--green:#23a559;--red:#f23f43;
  --text:#dbdee1;--muted:#80848e;--border:rgba(255,255,255,0.06);
}
body{font-family:'Cairo',sans-serif;background:var(--bg1);color:var(--text);height:100vh;overflow:hidden;}

/* LOGIN */
#loginScreen{height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,#1a1d3a 0%,#0d0f12 70%);}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:52px 44px;width:400px;text-align:center;box-shadow:0 40px 100px rgba(0,0,0,0.7);}
.login-logo{font-size:60px;margin-bottom:10px;}
.login-box h1{font-size:28px;font-weight:900;color:#fff;margin-bottom:6px;}
.login-box p{color:var(--muted);font-size:14px;margin-bottom:32px;}
.login-box input{width:100%;background:var(--bg3);border:2px solid var(--border);border-radius:12px;padding:15px 18px;font-size:16px;font-family:'Cairo',sans-serif;color:var(--text);text-align:center;outline:none;transition:border-color .2s;margin-bottom:14px;direction:rtl;}
.login-box input:focus{border-color:var(--accent);}
.login-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:15px;font-size:17px;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;transition:all .2s;}
.login-btn:hover{background:#4752c4;transform:translateY(-2px);}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* APP */
#appScreen{height:100vh;display:none;}

/* SIDEBAR */
.sidebar{width:280px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
#myAvatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:#fff;flex-shrink:0;}
.my-name-text{font-weight:700;font-size:15px;color:#fff;flex:1;}
.status-dot{width:9px;height:9px;border-radius:50%;background:var(--green);}
.section-header{padding:14px 16px 6px;display:flex;align-items:center;justify-content:space-between;}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
.add-btn{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;transition:color .15s;}
.add-btn:hover{color:var(--text);}
.list-container{overflow-y:auto;padding:2px 8px;}
.list-container.users{max-height:32vh;}
.list-container.groups{flex:1;}
.list-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:2px;position:relative;}
.list-item:hover{background:var(--bg3);}
.list-item.active{background:var(--bg4);}
.item-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:#fff;position:relative;flex-shrink:0;}
.grp-av{background:var(--bg4)!important;border-radius:10px!important;font-size:18px!important;color:var(--muted)!important;}
.dot{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg2);}
.dot.on{background:var(--green);}.dot.off{background:var(--muted);}
.item-info{flex:1;min-width:0;}
.item-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-sub{font-size:12px;color:var(--muted);}
.del-btn{opacity:0;font-size:14px;cursor:pointer;transition:opacity .15s;padding:2px;}
.list-item:hover .del-btn{opacity:1;}
.empty-list{text-align:center;color:var(--muted);font-size:13px;padding:20px 16px;line-height:1.8;}
.share-box{padding:12px;border-top:1px solid var(--border);}
.share-label{font-size:11px;color:var(--muted);margin-bottom:6px;text-align:center;}
.share-link{background:var(--bg3);border-radius:8px;padding:7px 10px;font-size:11px;color:var(--accent);word-break:break-all;text-align:center;border:1px solid var(--border);cursor:pointer;margin-bottom:6px;display:block;}
.copy-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px;font-size:13px;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;}
.copy-btn:hover{background:#4752c4;}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg1);}
#chatPlaceholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:14px;}
#chatPlaceholder .big-emoji{font-size:72px;}
#chatPlaceholder p{font-size:16px;}
#chatArea{display:none;flex-direction:column;flex:1;}
.chat-header{height:54px;padding:0 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;}
.chat-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#fff;flex-shrink:0;}
.chat-header-info{flex:1;}
.ch-name{font-weight:700;font-size:15px;color:#fff;}
#callStatus{font-size:12px;color:var(--green);font-weight:600;display:none;}
#callBtn{background:var(--green);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;display:none;align-items:center;gap:6px;transition:all .2s;}
#callBtn:hover{opacity:.85;}
#messagesContainer{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:6px;}
.msg{display:flex;}
.msg-me{justify-content:flex-start;}
.msg-them{justify-content:flex-end;}
.msg-bubble{max-width:65%;background:var(--bg3);border-radius:12px;padding:10px 14px;}
.msg-me .msg-bubble{background:var(--accent);border-radius:12px 12px 4px 12px;}
.msg-them .msg-bubble{border-radius:12px 12px 12px 4px;}
.msg-sender{font-size:12px;font-weight:700;margin-bottom:3px;}
.msg-text{font-size:14px;line-height:1.5;word-break:break-word;}
.msg-time{font-size:11px;color:rgba(255,255,255,0.35);margin-top:4px;text-align:left;}
.msg-me .msg-time{color:rgba(255,255,255,0.5);}
.input-area{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end;background:var(--bg2);}
#msgInput{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;font-family:'Cairo',sans-serif;color:var(--text);outline:none;resize:none;max-height:120px;direction:rtl;transition:border-color .2s;}
#msgInput:focus{border-color:var(--accent);}
#msgInput::placeholder{color:var(--muted);}
.send-btn{width:44px;height:44px;background:var(--accent);border:none;border-radius:10px;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.send-btn:hover{background:#4752c4;transform:scale(1.05);}

/* BACK BUTTON */
.back-btn{background:var(--bg3);border:none;color:var(--text);width:34px;height:34px;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
.back-btn:hover{background:var(--bg4);}

/* MOBILE */
@media(max-width:700px){
  .sidebar{position:fixed;right:0;top:0;bottom:0;z-index:100;transform:translateX(0);transition:transform .25s ease;}
  .sidebar.hidden{transform:translateX(100%);}
  .main{width:100%;}
  .back-btn{display:flex!important;}
}
@media(min-width:701px){
  .back-btn{display:none;}
}
.search-box{padding:10px 12px;border-bottom:1px solid var(--border);position:relative;}
.search-wrap{display:flex;align-items:center;background:var(--bg3);border-radius:10px;padding:0 10px;gap:6px;border:1px solid var(--border);transition:border-color .2s;}
.search-wrap:focus-within{border-color:var(--accent);}
.search-icon{font-size:14px;flex-shrink:0;}
.search-wrap input{flex:1;background:transparent;border:none;outline:none;padding:10px 0;font-size:14px;font-family:'Cairo',sans-serif;color:var(--text);direction:rtl;}
.search-wrap input::placeholder{color:var(--muted);}
.search-results{position:absolute;top:calc(100% + 4px);right:12px;left:12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;box-shadow:0 12px 40px rgba(0,0,0,0.5);z-index:200;max-height:240px;overflow-y:auto;display:none;}
.recent-item .item-info{min-width:0;flex:1;}
#createGroupModal{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(4px);}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:32px;width:360px;text-align:center;}
.modal-box h2{font-size:20px;font-weight:900;color:#fff;margin-bottom:8px;}
.modal-box p{color:var(--muted);font-size:13px;margin-bottom:20px;}
.modal-box input{width:100%;background:var(--bg3);border:2px solid var(--border);border-radius:10px;padding:13px 14px;font-size:15px;font-family:'Cairo',sans-serif;color:var(--text);outline:none;direction:rtl;margin-bottom:14px;text-align:center;transition:border-color .2s;}
.modal-box input:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:10px;}
.modal-create{flex:1;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;}
.modal-create:hover{background:#4752c4;}
.modal-cancel{flex:1;background:var(--bg4);color:var(--text);border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;}

/* INCOMING CALL */
#incomingCall{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:20px 24px;display:none;align-items:center;gap:16px;box-shadow:0 24px 64px rgba(0,0,0,0.7);z-index:999;animation:slideDown .3s ease;}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.inc-icon{font-size:38px;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.inc-info .inc-title{font-size:12px;color:var(--muted);}
.inc-info .inc-caller{font-size:16px;font-weight:700;color:#fff;}
.inc-btns{display:flex;gap:8px;}
.accept-btn{background:var(--green);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;}
.reject-btn{background:var(--red);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;font-family:'Cairo',sans-serif;cursor:pointer;}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:3px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">💬</div>
    <h1>أهلاً بيك!</h1>
    <p id="loginSubtitle">سجّل دخول أو إنشئ حساب جديد</p>
    <input type="text" id="nameInput" placeholder="اسمك..." maxlength="20" onkeydown="if(event.key==='Enter')document.getElementById('passInput').focus()">
    <input type="password" id="passInput" placeholder="الباسورد..." maxlength="30" onkeydown="if(event.key==='Enter')login()" style="margin-top:0">
    <div id="loginError" style="color:#ed4245;font-size:13px;margin-bottom:10px;display:none;"></div>
    <button class="login-btn" onclick="login()">دخول 🚀</button>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <div class="sidebar">
    <div class="sidebar-header">
      <div id="myAvatar">م</div>
      <span class="my-name-text" id="myNameDisplay">أنت</span>
      <div class="status-dot"></div>
    </div>

    <!-- بحث -->
    <div class="search-box">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="ابحث عن صاحبك..." oninput="onSearchInput()" autocomplete="off">
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>

    <!-- المحادثات الأخيرة -->
    <div class="section-header">
      <span class="section-title">المحادثات</span>
    </div>
    <div class="list-container" id="recentList" style="flex:1">
      <div class="empty-list">ابحث عن صاحبك فوق 👆</div>
    </div>

    <!-- الجروبات -->
    <div class="section-header">
      <span class="section-title">الجروبات</span>
      <div class="add-btn" title="جروب جديد" onclick="showCreateGroup()">+</div>
    </div>
    <div class="list-container groups" id="groupsList" style="max-height:28vh"></div>

    <div class="share-box">
      <div class="share-label">📎 ابعت الرابط لصاحبك</div>
      <div class="share-link" id="shareLink" onclick="copyLink()">...</div>
      <button class="copy-btn" onclick="copyLink()">📋 نسخ الرابط</button>
    </div>
  </div>

  <div class="main">
    <div id="chatPlaceholder">
      <div class="big-emoji">👈</div>
      <p>اختار صاحب أو جروب من القايمة</p>
    </div>
    <div id="chatArea">
      <div class="chat-header">
        <button class="back-btn" onclick="goBack()" title="رجوع">&#8594;</button>
        <div id="chatWithAvatar" class="chat-av">?</div>
        <div class="chat-header-info">
          <div class="ch-name" id="chatWithName">...</div>
          <div id="callStatus"></div>
        </div>
        <button id="callBtn" onclick="startCall()">📞 مكالمة</button>
      </div>
      <div id="messagesContainer"></div>
      <div id="typBar"></div>
      <div id="replyBar"><span>↩️ رد على:</span><span id="replyTxt"></span><span class="rcls" onclick="clearReply()">✕</span></div>
      <div class="input-area">
        <textarea id="msgInput" rows="1" placeholder="اكتب رسالة..."
          onkeydown="handleKey(event)"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- CREATE GROUP MODAL -->
<div id="createGroupModal">
  <div class="modal-box">
    <h2>🎉 جروب جديد</h2>
    <p>حط اسم للجروب وكل الناس هتلاقيه</p>
    <input type="text" id="groupNameInput" placeholder="اسم الجروب..." maxlength="30"
      onkeydown="if(event.key==='Enter')createGroup()">
    <div class="modal-btns">
      <button class="modal-create" onclick="createGroup()">إنشاء ✅</button>
      <button class="modal-cancel" onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>

<!-- INCOMING CALL -->
<div id="incomingCall">
  <div class="inc-icon">📞</div>
  <div class="inc-info">
    <div class="inc-title">مكالمة واردة من</div>
    <div class="inc-caller" id="incomingFrom">...</div>
  </div>
  <div class="inc-btns">
    <button class="accept-btn" onclick="acceptCall()">✅ رد</button>
    <button class="reject-btn" onclick="rejectCall()">❌ رفض</button>
  </div>
</div>

<div id="toasts"></div>
</body>
</html>
